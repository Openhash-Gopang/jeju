<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제주도청 AI</title>
<style>
body{margin:0;background:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:-apple-system,sans-serif;}
.loading{text-align:center;color:#6b7280;font-size:14px}
.dot{width:8px;height:8px;border-radius:50%;background:#0a7a4a;display:inline-block;margin:0 3px;animation:bounce .8s infinite alternate}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{transform:translateY(-8px);opacity:.4}}
</style>
</head>
<body>
<div class="loading">
  <div style="margin-bottom:12px"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
  제주도청 AI 로딩 중…
</div>
<script>
location.replace('/webapp.html' + location.search);
</script>
</body>
</html>
