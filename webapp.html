<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;overflow:hidden;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  font-size:15px;background:#fff;color:#111;-webkit-font-smoothing:antialiased}
:root{
  --sky:#0a7a4a;--sky-lt:#e6f4ec;--sky-dk:#075c37;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f3f4f6;--chip-border:#e5e7eb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto;background:#fff}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 12px) 16px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-icon{width:28px;height:28px;background:var(--sky);border-radius:7px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.topbar-name{font-size:15px;font-weight:800;color:#111;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:6px}
.auth-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--chip-bg);color:var(--txt2);border:1px solid var(--chip-border);display:none}
.trace-badge{font-size:10px;color:var(--txt3);padding:2px 8px;display:none}

.chat-screen{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 12px;display:flex;flex-direction:column;gap:10px;background:#fff}

.intro-section{display:flex;flex-direction:column;align-items:center;padding:36px 0 28px;gap:14px}
.intro-icon{width:64px;height:64px;border-radius:18px;background:var(--sky);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(10,122,74,.25);color:#fff;font-size:28px;font-weight:800}
.intro-title{font-size:20px;font-weight:800;color:#111;letter-spacing:-.4px;text-align:center}
.intro-sub{font-size:14px;color:var(--txt2);line-height:1.6;text-align:center}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 4px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;
  background:#fff;border:1.5px solid var(--chip-border);
  font-size:13px;font-weight:600;color:#374151;cursor:pointer;
  transition:border-color .12s,background .12s,color .12s;white-space:nowrap}
.chip:hover,.chip:active{background:var(--sky-lt);border-color:var(--sky);color:var(--sky-dk)}

.b-ai{max-width:88%;align-self:flex-start;background:#f9fafb;border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;padding:10px 14px;font-size:14px;line-height:1.7;color:#111;
  box-shadow:0 1px 2px rgba(0,0,0,.04)}
.b-user{max-width:88%;align-self:flex-end;background:var(--sky);color:#fff;
  border-radius:16px 16px 4px 16px;padding:10px 14px;font-size:14px;line-height:1.7}
.b-trace{font-size:10px;color:var(--txt3);align-self:flex-start;padding:0 4px;font-family:monospace}

.chat-input-area{background:#fff;border-top:1px solid var(--border);
  padding:10px 12px calc(10px + var(--safe-b));
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-textarea{flex:1;background:#f3f4f6;border:1.5px solid transparent;border-radius:22px;
  padding:10px 16px;font-family:'Pretendard',sans-serif;font-size:14px;
  resize:none;outline:none;max-height:100px;line-height:1.5;
  transition:border-color .15s,background .15s;color:#111}
.chat-textarea::placeholder{color:var(--txt3)}
.chat-textarea:focus{border-color:var(--sky);background:#fff}
.chat-send-btn{width:40px;height:40px;border-radius:50%;background:var(--sky);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;
  transition:background .12s;color:#fff}
.chat-send-btn:disabled{background:#bae6d0;cursor:not-allowed}

.toast{position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;
  z-index:9999;opacity:0;transition:all .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">

    </div>
    <div class="topbar-right">

  </div>

  <div class="chat-screen" id="chat-screen">
    <div class="chat-body" id="mob-chat-body">

      <div class="intro-section" id="intro-section">
        <div class="intro-icon">濟</div>
        <div>
          <div class="intro-title">제주도청 · 시청 · 읍면동 AI</div>
          <div class="intro-sub" style="margin-top:6px">복지 · 세정 · 건축 · 상하수도 · 농업 등<br>제주 행정 관련 무엇이든 요청하거나 지시하세요.</div>
        </div>
        <div class="chip-row">
          <button class="chip" onclick="qs('수돗물에서 냄새가 나요, 민원 접수해줘')">상하수도 민원</button>
          <button class="chip" onclick="qs('기초생활수급 신청 처리해줘')">복지 안내</button>
          <button class="chip" onclick="qs('고향사랑기부금 세액공제 한도 확인해줘')">고향사랑기부</button>
          <button class="chip" onclick="qs('건축허가 신청 접수해줘')">건축 인허가</button>
        </div>
      </div>

    </div>

    <div class="attach-preview" id="attach-preview" style="display:none;align-items:center;gap:8px;padding:6px 14px;font-size:13px;color:var(--sub,#6b7280)">
      <span id="attach-name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
      <button id="attach-remove-btn" style="border:none;background:none;color:#dc2626;cursor:pointer">✕</button>
    </div>
    <div class="chat-input-area">
      <button class="chat-send-btn" id="mob-attach-btn" title="서류 첨부" style="margin-right:4px">📎</button>
      <input type="file" id="mob-file-input" accept=".txt,.pdf,.docx,image/*" multiple style="display:none">
      <textarea class="chat-textarea" id="mob-input" rows="1" placeholder="무엇을 도와드릴까요?"
        oninput="autoResize(this);updateSendBtn()"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();mobSend();}"></textarea>
      <button class="chat-send-btn" id="mob-send-btn" disabled onclick="mobSend()">↑</button>
    </div>
  </div>

</div>
<div class="toast" id="mob-toast"></div>

<script type="module">
import { assembleGovSystemPrompt as assembleJejuSystemPrompt, resolveGovAgency as resolveJejuAgency, resolveProvinceCode as resolveJejuProvinceCode, findStaffContact, resolveHandlerCodeFromTrace } from '/jeju-router.js';
window._assembleJejuSystemPrompt = assembleJejuSystemPrompt;
window._resolveJejuAgency = resolveJejuAgency;
window._resolveJejuProvinceCode = resolveJejuProvinceCode;
window._findStaffContact = findStaffContact;
window._resolveHandlerCodeFromTrace = resolveHandlerCodeFromTrace;
</script>

<script>
// ── 상수 ──────────────────────────────────────────────────────
const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';
const SP_FALLBACK = `당신은 제주특별자치도청 AI입니다. 아직 라우터 로드에 실패해 도메인 특화 SP 없이
일반 지식으로만 응답 중임을 사용자에게 알리고, 정확한 안내는 제주콜센터(064-120)를 권장하세요.`;

// ── GPS 기반 읍면동 감지 (JEJU-GOV-COMMON §2 "관할 검증" 자동화) ──
// PDV 힌트(localStorage.gopang_user_v4)는 jeju.hondi.net이 별도 오리진이라
// hondi.net의 localStorage를 못 읽어 항상 null이었다(사고실험에서 발견된
// 문제). GPS 리버스 지오코딩(카카오 coord2address, hondi-proxy /geocode
// 경유)으로 대체 — 오리진 문제 없이 실제 현재 위치를 바로 얻는다.
let _gpsEmdCache = null;
let _gpsAttempted = false;

async function _detectGpsLocation() {
  if (_gpsAttempted) return _gpsEmdCache;
  _gpsAttempted = true;
  if (!navigator.geolocation) return null;
  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 6000, maximumAge: 300000 });
    });
    const { latitude: lat, longitude: lng } = pos.coords;
    const r = await fetch(`${PROXY}/geocode?lat=${lat}&lng=${lng}`);
    if (!r.ok) throw new Error('geocode ' + r.status);
    const d = await r.json();
    const doc = d.documents?.[0];
    if (!doc) return null;
    const region1 = doc.road_address?.region_1depth_name || doc.address?.region_1depth_name;
    const region2 = doc.road_address?.region_2depth_name || doc.address?.region_2depth_name;
    const region3 = doc.road_address?.region_3depth_name
      || (doc.address?.region_3depth_name || '').split(' ')[0];
    if (!region1) return null;
    // ★ 2026-07-21 수정 — "제주 밖이면 버림" 필터 제거. jeju-router.js는
    // 이미 전국 동적 판별 진입점으로 전환됐는데(#2) 이 함수만 옛 필터가
    // 남아 있어서 실제로는 제주 밖 GPS 좌표가 여전히 무시되고 있었다.
    // emdName에 도(광역)까지 포함한 전체 주소 문자열을 담아, 도 판별
    // (_guessProvinceFromText)까지 이 값 하나로 가능하게 한다 — 호출부
    // (_callAIRaw)는 gps?.emdName을 그대로 쓰므로 코드 변경 없이도
    // 자동으로 전국 대응된다.
    const fullHint = [region1, region2, region3].filter(Boolean).join(' ');
    _gpsEmdCache = { emdName: fullHint, city: region2, province: region1 };
    console.log('[Jeju] GPS 위치 감지:', fullHint);
    toast(`현재 위치: ${region3 || region2 || region1}`);
    return _gpsEmdCache;
  } catch (e) {
    console.warn('[Jeju] GPS 위치 확인 실패(권한 거부·타임아웃 등):', e.message);
    return null;
  }
}

// ── PDV 거주지 힌트(GPS 실패 시 최후 폴백 — 대부분 null로 확인됨) ──
function _pdvLocationHint() {
  try {
    const p = JSON.parse(localStorage.getItem('gopang_user_v4') || sessionStorage.getItem('gopang_user_v4') || 'null');
    return p?.address || p?.location || null;
  } catch { return null; }
}

// ── PDV 중개 접근 (JEJU-GOV-COMMON §13) ─────────────────────────
// PDV는 나만의 AI 비서(hondi.net, GWP 오프너)만 읽는다. 이 함수는 그쪽에
// GWP_PDV_REQUEST를 보내고 사용자 승인을 기다린다. GWP를 거치지 않고 이
// 페이지에 직접 접속한 경우(window.opener 없음)는 즉시 no_opener로 반환한다
// (§13-5) — 이 경우 SP가 대화로 직접 물어보는 방식으로 전환해야 한다.
function _requestPdvData(fields, reason, requestingSp) {
  return new Promise((resolve) => {
    if (!window.opener) {
      resolve({ approved: false, no_opener: true });
      return;
    }
    const request_id = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      resolve({ approved: false, timeout: true });
    }, 60000); // 사용자가 승인 버튼 누를 시간 60초

    function handler(e) {
      const msg = e.data;
      if (msg?.type !== 'GWP_PDV_RESPONSE' || msg.request_id !== request_id) return;
      clearTimeout(timer);
      window.removeEventListener('message', handler);
      resolve(msg);
    }
    window.addEventListener('message', handler);

    window.opener.postMessage({
      type: 'GWP_PDV_REQUEST', request_id,
      requesting_sp: requestingSp, fields, reason,
    }, 'https://hondi.net');
  });
}

// SP 응답에서 [PDV_REQUEST: ...] 태그를 찾는다. request_id는 SP가 뭘 쓰든
// 신뢰하지 않고 이 함수 호출부에서 새로 발급한다(LLM이 진짜 UUID를 안정적으로
//못 만들 수 있어서).
function _parsePdvRequestTag(text) {
  const m = text.match(/\[PDV_REQUEST:([^\]]*fields=\[[^\]]*\][^\]]*)\]/);
  if (!m) return null;
  const body = m[0];
  const spMatch     = body.match(/requesting_sp=([^,\]]+)/);
  const fieldsMatch = body.match(/fields=\[([^\]]+)\]/);
  const reasonMatch = body.match(/reason=([^\]]+?)\]?$/);
  if (!fieldsMatch) return null;
  return {
    requestingSp: spMatch ? spMatch[1].trim() : 'unknown',
    fields: fieldsMatch[1].split(',').map(s => s.trim()).filter(Boolean),
    reason: reasonMatch ? reasonMatch[1].trim() : '',
    fullMatch: m[0],
  };
}

// ── G19(HUMAN-AUTHORITY-GATE-SCHEMA) — 외부 발급 서류 획득·전달 ────────
// _requestPdvData()와 완전히 같은 구조(오프너에 요청 → 승인 대기 →
// 응답)이지만, 오프너가 즉답 못 하고 사용자의 실제 파일 첨부를
// 기다려야 하므로 타임아웃을 훨씬 길게 둔다(파일 발급·첨부에 실제
// 시간이 걸림 — PDV 값 승인 버튼 클릭 60초와는 성격이 다르다).
function _requestDocAcquire(docType, reason, requestingSp) {
  return new Promise((resolve) => {
    if (!window.opener) {
      resolve({ approved: false, no_opener: true });
      return;
    }
    const request_id = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      resolve({ approved: false, timeout: true });
    }, 10 * 60 * 1000); // 정부24 발급·첨부 시간 고려 — 10분

    function handler(e) {
      const msg = e.data;
      if (msg?.type !== 'GWP_DOC_RESPONSE' || msg.request_id !== request_id) return;
      clearTimeout(timer);
      window.removeEventListener('message', handler);
      resolve(msg);
    }
    window.addEventListener('message', handler);

    window.opener.postMessage({
      type: 'GWP_DOC_REQUEST', request_id,
      requesting_sp: requestingSp, doc_type: docType, reason,
    }, 'https://hondi.net');
  });
}

// SP 응답에서 [DOC_ACQUIRE_REQUEST: ...] 태그를 찾는다 — _parsePdvRequestTag와
// 동일한 관용(request_id는 여기서 새로 발급, LLM 출력을 신뢰하지 않음).
function _parseDocAcquireRequestTag(text) {
  const m = text.match(/\[DOC_ACQUIRE_REQUEST:([^\]]*doc_type=[^,\]]+[^\]]*)\]/);
  if (!m) return null;
  const body = m[0];
  const docTypeMatch = body.match(/doc_type=([^,\]]+)/);
  const spMatch      = body.match(/requesting_sp=([^,\]]+)/);
  const reasonMatch  = body.match(/reason=([^\]]+?)\]?$/);
  if (!docTypeMatch) return null;
  return {
    docType: docTypeMatch[1].trim(),
    requestingSp: spMatch ? spMatch[1].trim() : 'unknown',
    reason: reasonMatch ? reasonMatch[1].trim() : '',
    fullMatch: m[0],
  };
}

// ── 사용자 식별자(guid=ipv6) 확보 ────────────────────────────────
function _getUserGuid() {
  try {
    const token = JSON.parse(sessionStorage.getItem('gopang_sso_token') || '{}');
    return token.ipv6 || 'anonymous';
  } catch (e) { return 'anonymous'; }
}

// ── /gov/relay 호출 (2026-07-05: /ai/chat 직접 호출에서 이전) ───────
// 그동안 jeju-router.js가 UNIVERSAL-INTEGRITY까지만 클라이언트에서 직접
// 붙이고 /ai/chat으로 바로 쏘던 경로라, UNIVERSAL-common(U1~U9, 특히
// SP 간 호출 프로토콜 U9)이 전혀 적용되지 않고 있었다. /gov/relay는
// UNIVERSAL-INTEGRITY + UNIVERSAL-common을 서버가 강제로 맨 앞에 붙이므로
// (클라이언트가 빠뜨리거나 조작 불가 — SP-COMMON-05 H2), 이제부터 sp
// 변수는 "JEJU-GOV-COMMON 이하"만 담당하고 agencyPrompt로 전달한다.
// agency는 jeju-router.js의 resolveJejuAgency(trace)가 국가기관/도청
// 트리 중 실제로 어느 쪽이 선택됐는지에 따라 'gov_national'|'gov_do'로
// 정해준다 — worker.js의 GOV_AGENCIES/SP_DELEGATION_REGISTRY 키와 반드시
// 동일해야 한다(어긋나면 UNKNOWN_AGENCY로 조용히 거부됨). provinceCode도
// 함께 실어 보내야 worker.js가 도별 동적 위임 렌더링을 할 수 있다
// (2026-07-21 신설).
// gov_do/gov_national은 SP_DELEGATION_ORIGINATORS(위임 시작 가능)라
// 서버가 stream을 강제로 끄므로 여기서도 stream:false로 요청한다.
async function _govRelayCompletion(agencyPrompt, messages, agency, provinceCode = null) {
  const guid = _getUserGuid();
  try {
    const r = await fetch(`${PROXY}/gov/relay`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guid, agency, agencyPrompt, messages, provinceCode, max_tokens: 2000, stream: false, tier: 'gov-flash' }),
    });
    if (!r.ok) {
      const errBody = await r.json().catch(() => ({}));
      if (r.status === 429) {
        return errBody.detail || '오늘 이용 가능한 한도를 모두 사용했습니다. 내일 다시 이용해 주세요.';
      }
      throw new Error(`gov/relay ${r.status}: ${errBody.detail || ''}`);
    }
    const d = await r.json();
    return d.choices?.[0]?.message?.content || '잠시 후 다시 시도해 주세요.';
  } catch(e) {
    console.warn('[Jeju] gov/relay 실패 → 재시도:', e.message);
    // 2026-07-18 수정: 폴백이 api.anthropic.com을 키 없이 직접 호출해서
    // gov/relay 장애 시 폴백도 함께 실패하는 이중 장애였다. gopang
    // worker.js의 공용 프록시 경로 /chat/completions(callDeepSeek)로 교체.
    const r2 = await fetch(`${PROXY}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'deepseek-v4-pro', max_tokens:1000, temperature:0.7,
        messages:[{role:'system',content:agencyPrompt}, ...messages.slice(-8)] }),
    });
    if (!r2.ok) throw new Error(`fallback ${r2.status}`);
    const d2 = await r2.json();
    return d2.choices?.[0]?.message?.content || '오류가 발생했습니다.';
  }
}

// ── AI 호출(원본) — 라우터로 SP 동적 조립 + PDV 중개(§13) 2단계 흐름 ──
async function _callAIRaw(messages, latestUserText, onProgress) {
  let sp = SP_FALLBACK, trace = [], agency = 'gov_do', provinceCode = null;
  try {
    const gps = await _detectGpsLocation();
    // 우선순위: ① GPS 실시간 감지(가장 정확, 매 턴 재검증)
    //         ② GWP facts로 넘어온 위치(메인 비서 쪽 GPS/주소 — 오리진 문제 우회)
    //         ③ 기존 PDV 힌트(교차 오리진이라 실질적으로 항상 null)
    const locationHint = gps?.emdName || _urlFactsLocation || _pdvLocationHint();
    // onProgress(2026-07-21 신설) — 시군구 리졸버가 SSE로 매초 진행상황을
    // 보내면 assembleGovSystemPrompt의 4번째 인자(onProgress)로 그대로
    // 전달돼, mobSend()의 임시 말풍선을 실시간으로 갱신한다. 3번째
    // 인자(classifyFn)는 이 배포에서 안 쓰므로 null 명시.
    const r = await window._assembleJejuSystemPrompt(latestUserText, locationHint, null, onProgress);
    sp = r.systemPrompt;
    trace = r.trace;
    agency = window._resolveJejuAgency(trace);
    provinceCode = window._resolveJejuProvinceCode ? window._resolveJejuProvinceCode() : null;
    _lastAgency = agency;
  } catch (e) {
    console.warn('[Jeju] SP 조립 실패, 폴백 사용:', e.message);
  }
  document.getElementById('trace-badge').textContent = trace.join(' > ');
  document.getElementById('trace-badge').style.display = trace.length ? 'inline-block' : 'none';

  let text = await _govRelayCompletion(sp, messages, agency, provinceCode);

  // Step 5 연장: SP가 PDV 필드를 요청했으면 나만의 AI 비서에게 중개 요청
  const pdvReq = _parsePdvRequestTag(text);
  if (pdvReq) {
    const result = await _requestPdvData(pdvReq.fields, pdvReq.reason, pdvReq.requestingSp);
    let pdvContext;
    if (result.no_opener) {
      pdvContext = `[PDV_RESULT: 이 세션은 GWP(나만의 AI 비서)를 거치지 않고 직접 접속됐습니다. ` +
        `PDV 중개 요청 자체가 불가능합니다 — §13-5에 따라 사용자에게 필요한 정보를 대화로 직접 물어보고, ` +
        `그 답변은 세션 안에서만 참고하고 PDV에 저장하지 마십시오.]`;
    } else if (result.timeout) {
      pdvContext = `[PDV_RESULT: 사용자가 60초 내에 승인/거부를 응답하지 않았습니다. 응답 없이 진행 가능한 선까지만 답하십시오.]`;
    } else if (!result.approved) {
      pdvContext = `[PDV_RESULT: 사용자가 정보 제공을 거부했습니다(fields=${pdvReq.fields.join(',')}). ` +
        `§11 능동적 역량 원칙에 따라 이 필드 없이 답할 수 있는 부분까지는 계속 답하고, 왜 더 정확히 못 답하는지만 짧게 밝히십시오.]`;
    } else {
      pdvContext = `[PDV_RESULT: 승인됨. 값: ${JSON.stringify(result.values)}. ` +
        `not_in_pdv:true로 표시된 필드는 실제로 PDV에 없는 것이니 지어내지 말고 §13-4 문구로 안내하십시오.]`;
    }
    const followup = [...messages,
      { role: 'assistant', content: text },
      { role: 'user', content: pdvContext },
    ];
    text = await _govRelayCompletion(sp, followup, agency, provinceCode);
  }

  // Step 5 연장: SP가 정부24 등 외부 서류를 요청했으면(G19) 나만의 AI 비서에게
  // 실제 파일 첨부를 중개 요청. 파일 내용 자체는 지금 이 LLM 호출에 멀티모달로
  // 넣지 않는다(_govRelayCompletion이 텍스트 messages만 다루는 구조라 —
  // 문서/이미지 콘텐츠 블록 지원은 별도 작업) — 대신 세션에 누적해뒀다가
  // G18(STAFF_REVIEW_GATE) 산출물 번들에 그대로 실어 담당부서로 넘긴다.
  const docReq = _parseDocAcquireRequestTag(text);
  if (docReq) {
    const result = await _requestDocAcquire(docReq.docType, docReq.reason, docReq.requestingSp);
    let docContext;
    if (result.no_opener) {
      docContext = `[DOC_ACQUIRE_RESULT: 이 세션은 GWP(나만의 AI 비서)를 거치지 않고 직접 접속됐습니다. ` +
        `외부 서류 중개 요청 자체가 불가능합니다 — 사용자에게 ${docReq.docType}을(를) 정부24 앱 등에서 직접 발급받아 ` +
        `담당부서에 제출하도록 안내하고, 이 세션에서는 서류 없이 진행 가능한 선까지만 답하십시오.]`;
    } else if (result.timeout) {
      docContext = `[DOC_ACQUIRE_RESULT: 사용자가 10분 내에 서류를 첨부하지 않았습니다(정부24 발급에 시간이 더 걸릴 수 있음). ` +
        `서류 없이 진행 가능한 선까지만 답하고, 준비되면 다시 요청하라고 안내하십시오.]`;
    } else if (result.reason === 'file_too_large') {
      docContext = `[DOC_ACQUIRE_RESULT: 첨부 파일이 5MB를 초과해 거부됐습니다. 담당부서에 직접(전화·방문) 제출하도록 안내하십시오.]`;
    } else if (!result.approved) {
      docContext = `[DOC_ACQUIRE_RESULT: 사용자가 서류 제출을 건너뛰었습니다(doc_type=${docReq.docType}). ` +
        `G2(사실확인 게이트)에 따라 이 서류 없이는 최종 접수로 진행하지 말고, 어디까지 준비됐는지만 안내하십시오.]`;
    } else {
      _acquiredDocs.push({ docType: docReq.docType, file: result.file, acquiredAt: new Date().toISOString() });
      docContext = `[DOC_ACQUIRE_RESULT: 승인됨. 파일명: ${result.file.name} (${result.file.mime}, ${result.file.size}바이트). ` +
        `이 서류는 세션에 확보돼 최종 담당부서 확인·승인(G18) 시 함께 전달됩니다 — 접수 진행하십시오.]`;
    }
    const docFollowup = [...messages,
      { role: 'assistant', content: text },
      { role: 'user', content: docContext },
    ];
    text = await _govRelayCompletion(sp, docFollowup, agency);
  }

  // Step 5 재연장: SP가 담당부서 확인·승인을 요청했으면(G18, 2026-07-19
  // 조립 체인 신설과 함께 처음 소비) 연락처를 조회해 안내하고, 원문
  // 태그가 사용자에게 그대로 노출되지 않도록 후속 호출로 마무리한다.
  const staffReq = _parseStaffReviewGateTag(text);
  if (staffReq) {
    let staffContext;
    if (staffReq.handlerType !== 'DEPARTMENT_CONTACT') {
      // HONDI_STAFF_USER 등 향후 값 — 아직 인앱 알림 채널이 없으므로
      // 안전하게 DEPARTMENT_CONTACT처럼 취급(연락처 안내로 폴백).
      staffContext = `[STAFF_REVIEW_RESULT: handler_type=${staffReq.handlerType}은 아직 지원되지 않습니다 — ` +
        `DEPARTMENT_CONTACT(담당부서 연락처 안내)로 폴백하십시오.]`;
    } else {
      // 2026-07-19 수정 — LLM이 채운 staffReq.handlerCode는 신뢰하지
      // 않는다(형식이 안 맞을 수 있음). 라우터가 이번 턴에 실제로
      // 매칭한 trace의 가장 구체적인 노드를 대신 쓴다 — 항상 정확한
      // 형식이 보장된다.
      const resolvedCode = window._resolveHandlerCodeFromTrace(trace) || staffReq.handlerCode;
      const contact = await window._findStaffContact(resolvedCode).catch(() => null);
      staffContext = contact
        ? `[STAFF_REVIEW_RESULT: 담당부서 확인됨 — ${contact.name}` +
          `${contact.phone ? `, 연락처 ${contact.phone}` : ''}${contact.hours ? `(운영 ${contact.hours})` : ''}. ` +
          `조립된 내용은 최종 확인을 위해 이 연락처로 직접 제출·문의해야 합니다(플랫폼 밖 확인 — G18 §DEPARTMENT_CONTACT). ` +
          `사용자에게 이 연락처를 안내하고 마무리하십시오.]`
        : `[STAFF_REVIEW_RESULT: handler_code="${resolvedCode}"에 대응하는 담당부서 연락처를 찾지 못했습니다 — ` +
          `일반 대표 채널(콜센터·정부24)로 안내하고, 정확한 담당부서는 확인 후 다시 알려주겠다고 밝히십시오.]`;
    }
    const staffFollowup = [...messages,
      { role: 'assistant', content: text },
      { role: 'user', content: staffContext },
    ];
    text = await _govRelayCompletion(sp, staffFollowup, agency);
  }

  return { text, trace };
}

// ── AI 호출(§13b PDV_HISTORY_REQUEST 가로채기 계층) ──────────────
// 2026-07-04: tax/school/stock/market과 동일 패턴. scope 값은 jeju-router.js
// (assembleJejuSystemPrompt)가 §13b 자리표시자에 이미 정확히 치환해뒀으므로
// (SP_CODE_TO_PDV_SCOPE 참조), 여기서는 그 값을 그대로 신뢰해 태그를
// 파싱·조회하기만 하면 된다.
async function callAI(messages, latestUserText, onProgress) {
  const raw = await _callAIRaw(messages, latestUserText, onProgress);
  if (!window.PdvHistoryClient || !/\[PDV(?:_HISTORY)?_REQUEST:/.test(raw.text)) return raw;

  let ipv6 = 'anonymous';
  try {
    const token = JSON.parse(sessionStorage.getItem('gopang_sso_token') || '{}');
    ipv6 = token.ipv6 || 'anonymous';
  } catch (e) {}

  const { interceptPdvTags } = window.PdvHistoryClient;
  const r = await interceptPdvTags(raw.text, {
    svc: 'jeju', ipv6,
    resumeContext: { messages, latestUserText },
  });
  if (!r) return raw;
  if (r.redirecting) return raw; // 페이지 이동 중 — 반환값은 사실상 안 쓰임

  const summaryText = (r.results || []).map(x => {
    if (x.error) return `(${x.scope} 이력 조회 실패: ${x.error})`;
    if (!x.summary || x.summary.available === false) return `(${x.scope} 이전 기록 없음)`;
    return `(${x.scope} 이전 기록: ${JSON.stringify(x.summary)})`;
  }).join('\n');

  const cleaned = raw.text.replace(/\[PDV(?:_HISTORY)?_REQUEST:[^\]]+\]/g, '').trim();
  const followUp = [
    ...messages,
    { role: 'assistant', content: cleaned || '(이전 기록을 조회하겠습니다)' },
    { role: 'user', content: `[시스템: PDV 조회 결과]\n${summaryText}\n\n위 조회 결과를 반영해서 답변을 이어가 주세요.` },
  ];
  return _callAIRaw(followUp, latestUserText, onProgress);
}

// ── 첨부파일 처리 (2026-07-19 포팅 — kgov §REQUIRED-DOCUMENTS가 이미
// 전제하고 있던 "같은 대화창에 첨부하면 본문 추출돼 전달된다"는 흐름을
// gopang의 메인 webapp.html에서 그대로 옮겨왔다. jeju 탭에는 이 기능
// 자체가 없었다 — SP 프롬프트(kgov 상속)는 이미 이 흐름을 전제하고
// 있었는데 클라이언트 구현이 빠져 있던 게 진짜 구멍이었다. 로직은
// gopang과 100% 동일하게 유지한다(포맷이 어긋나면 GOV_TASK_SUBMIT_
// REQUEST의 sha256 매칭이 깨진다).
let _pdfjsLoaded = null;
function _ensurePdfJs() {
  if (_pdfjsLoaded) return _pdfjsLoaded;
  _pdfjsLoaded = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.js';
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.js';
      resolve();
    };
    s.onerror = () => reject(new Error('pdf.js 로드 실패'));
    document.head.appendChild(s);
  });
  return _pdfjsLoaded;
}
let _mammothLoaded = null;
function _ensureMammoth() {
  if (_mammothLoaded) return _mammothLoaded;
  _mammothLoaded = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.7.0/mammoth.browser.min.js';
    s.onload = resolve;
    s.onerror = () => reject(new Error('mammoth.js 로드 실패'));
    document.head.appendChild(s);
  });
  return _mammothLoaded;
}
async function _extractFileText(file) {
  const MAX_CHARS = 20000;
  try {
    if (file.type === 'text/plain') return (await file.text()).slice(0, MAX_CHARS);
    if (file.type === 'application/pdf') {
      await _ensurePdfJs();
      const buf = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
      let text = '';
      for (let i = 1; i <= pdf.numPages && text.length < MAX_CHARS; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        text += content.items.map(it => it.str).join(' ') + '\n';
      }
      return text.slice(0, MAX_CHARS);
    }
    if (file.name.toLowerCase().endsWith('.docx')) {
      await _ensureMammoth();
      const buf = await file.arrayBuffer();
      const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
      return (result.value || '').slice(0, MAX_CHARS);
    }
  } catch (e) {
    console.warn('[Jeju][Attach] 본문 추출 실패:', file.name, e.message);
    return null;
  }
  return null;
}
let _mobAttachedFiles = [];
const _attachPreviewEl = document.getElementById('attach-preview');
const _attachNameEl = document.getElementById('attach-name');
function _renderAttachPreview() {
  if (!_attachPreviewEl || !_attachNameEl) return;
  if (!_mobAttachedFiles.length) { _attachPreviewEl.style.display = 'none'; return; }
  const names = _mobAttachedFiles.map(f => (f.isImage ? '📷 ' : '📎 ') + f.name).join(', ');
  _attachNameEl.textContent = _mobAttachedFiles.length > 1
    ? `${_mobAttachedFiles.length}개 파일: ${names}` : names;

}

  _mobAttachedFiles = [];

}
async function _addAttachedFile(file) {
  if (!file) return;
  const entry = { name: file.name, dataUrl: null, isImage: file.type.startsWith('image/'),
    mimeType: file.type, sha256: null, extractedText: null, _hashPromise: null, _extractPromise: null };
  const reader = new FileReader();
  const dataUrlPromise = new Promise((resolve) => { reader.onload = () => { entry.dataUrl = reader.result; resolve(); }; });
  reader.readAsDataURL(file);
  await dataUrlPromise;
  entry._hashPromise = file.arrayBuffer()
    .then(buf => crypto.subtle.digest('SHA-256', buf))
    .then(hashBuf => Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join(''))
    .then(hex => { entry.sha256 = hex; return hex; })
    .catch(e => { console.warn('[Jeju][Attach] SHA-256 계산 실패:', e.message); return null; });
  entry._extractPromise = entry.isImage ? Promise.resolve(null)
    : _extractFileText(file).then(text => { entry.extractedText = text; return text; });
  _mobAttachedFiles.push(entry);
  _renderAttachPreview();
}

// 첨부파일을 kgov §REQUIRED-DOCUMENTS/GOV_TASK_SUBMIT_REQUEST가 기대하는
// 형식(text + image_url 블록, sha256 포함)으로 변환 — gopang과 동일 포맷.
async function _buildUserContent(userText, files) {
  if (!files.length) return userText;
  await Promise.all(files.map(f => Promise.all([
    f._hashPromise    ? f._hashPromise.catch(() => null)    : null,
    f._extractPromise ? f._extractPromise.catch(() => null) : null,
  ])));
  const contentBlocks = [];
  const textParts = [];
  if (userText) textParts.push(userText);
  for (const f of files) {
    if (f.isImage) {
      contentBlocks.push({ type: 'image_url', image_url: { url: f.dataUrl } });
      textParts.push(f.sha256
        ? `[첨부 이미지: "${f.name}", sha256=${f.sha256} — 정부서비스 서류 접수가 필요하면 GOV_TASK_SUBMIT_REQUEST의 documents 항목에 이 sha256을 그대로 사용하세요. 어떤 서류인지는 사진 내용과 대화 맥락으로 판단하세요.]`
        : `[첨부 이미지: "${f.name}" — sha256 계산 실패, GOV_TASK_SUBMIT_REQUEST를 만들 수 없습니다.]`);
    } else if (f.extractedText) {
      textParts.push(`[첨부파일 "${f.name}" 본문 추출 결과${f.sha256 ? ` | sha256=${f.sha256}` : ''}]\n${f.extractedText}\n[본문 추출 끝 — 위 내용을 근거로 이 파일이 어떤 서류인지 직접 판단하세요${f.sha256 ? `. GOV_TASK_SUBMIT_REQUEST의 documents 항목에는 이 sha256을 사용하세요.]` : ' (sha256 계산 실패로 GOV_TASK_SUBMIT_REQUEST에는 쓸 수 없습니다).]'}`);
    } else {
      textParts.push(`[첨부파일: "${f.name}"${f.sha256 ? ` | sha256=${f.sha256}` : ''} — 본문 추출 실패 또는 미지원 형식. 파일명과 대화 맥락으로만 판단해야 합니다.]`);
    }
  }
  const combinedText = textParts.join('\n');
  return contentBlocks.length ? [{ type: 'text', text: combinedText }, ...contentBlocks] : combinedText;
}

// SP 응답에서 [STAFF_REVIEW_GATE: ...] 태그를 찾는다 (G18,
// HUMAN-AUTHORITY-GATE-SCHEMA — 2026-07-19 조립 체인에 신설 삽입된 뒤
// 처음 소비하는 코드). 지금 유일하게 활성화된 handler_type은
// DEPARTMENT_CONTACT — 사람이 즉시 이 대화 안에서 확인·승인을 눌러주는
// 구조가 아니므로, 여기서는 "담당부서 연락처를 안내하고 조립된 내용을
// 넘겼다"는 사실만 사용자에게 보여준다(§보조 경로 없음 — G19와 달리
// 이건 사람이 플랫폼 밖에서 하는 확인이라 응답을 기다리지 않는다).
function _parseStaffReviewGateTag(text) {
  const m = text.match(/\[STAFF_REVIEW_GATE:([^\]]*handler_code=[^,\]]+[^\]]*)\]/);
  if (!m) return null;
  const body = m[0];
  const handlerCodeMatch = body.match(/handler_code=([^,\]]+)/);
  const handlerTypeMatch = body.match(/handler_type=([^,\]]+)/);
  const summaryMatch     = body.match(/summary=([^\]]+?)\]?$/);
  if (!handlerCodeMatch) return null;
  return {
    handlerCode: handlerCodeMatch[1].trim(),
    handlerType: handlerTypeMatch ? handlerTypeMatch[1].trim() : 'DEPARTMENT_CONTACT',
    summary: summaryMatch ? summaryMatch[1].trim() : '',
    fullMatch: m[0],
  };
}

async function mobSend() {
  const inp = document.getElementById('mob-input');
  const msg = inp.value.trim();
  const files = _mobAttachedFiles.slice();
  if (!msg && !files.length) return;
  inp.value = '';
  autoResize(inp);
  updateSendBtn();
  hideIntro();
  const displayText = files.length
    ? (msg ? `${msg}\n` : '') + files.map(f => (f.isImage ? '📷 ' : '📎 ') + f.name).join(', ')
    : msg;
  addMob(displayText, 'user');
  const userContent = await _buildUserContent(msg, files);
  hist.push({ role:'user', content:userContent });
  _clearAttachPreview();
  const btn = document.getElementById('mob-send-btn');
  btn.disabled = true;
  const tid = addMob('…', 'ai');
  // onProgress(2026-07-21 신설) — 새 말풍선을 만들지 않고 이미 있는
  // 임시 말풍선(tid)의 내용을 진행상황 텍스트로 갱신한다. 최종 답이
  // 오면 어차피 이 요소를 지우고(remove) 새로 addMob하므로, 그 전까지
  // 잠깐 보여주는 용도로만 쓰인다.
  const onProgress = (p) => {
    const el = document.getElementById(tid);
    if (el && p?.message) el.innerHTML = String(p.message).replace(/\n/g, '<br>');
  };
  try {
    const { text, trace } = await callAI(hist.slice(-10), msg, onProgress);
    document.getElementById(tid)?.remove();
    addMob(text, 'ai');
    if (trace?.length) addTrace(trace.join(' → '));
    hist.push({ role:'assistant', content:text });
    _recordPdv(msg, trace);
  } catch (e) {
    document.getElementById(tid)?.remove();
    addMob('오류가 발생했습니다. 다시 시도해 주세요.', 'ai');
  }
  btn.disabled = false;
}

function addMob(text, type) {
  const id = 'mb' + (mc++);
  const body = document.getElementById('mob-chat-body');
  const d = document.createElement('div');
  d.id = id;
  d.className = type === 'user' ? 'b-user' : 'b-ai';
  d.innerHTML = text.replace(/\n/g, '<br>');
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  return id;
}
function addTrace(text) {
  const body = document.getElementById('mob-chat-body');
  const d = document.createElement('div');
  d.className = 'b-trace';
  d.textContent = '[SP_CHAIN] ' + text;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}

function qs(s) {
  document.getElementById('mob-input').value = s;
  updateSendBtn();
  mobSend();
}
function toast(msg) {
  const t = document.getElementById('mob-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── PDV 표준 payload ───────────────────────────────────────────
function _recordPdv(userMsg, trace) {
  try {
    const token = JSON.parse(sessionStorage.getItem('gopang_sso_token') || '{}');
    const user_guid = token.ipv6 || 'anonymous';
    fetch(`${PROXY}/pdv_log`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_guid,
        source: 'jeju',
        report: {
          pdv_6w: {
            who:   user_guid,
            when:  new Date().toISOString(),
            where: window._gopangLocation || '위치 미확인',
            what:  '제주도청 AI 채팅',
            how:   `민원: ${userMsg.slice(0, 60)} / 체인: ${(trace||[]).join('>')}`,
            why:   '제주 지방행정 안내',
          },
        },
      }),
    }).catch(() => {});
  } catch(e) { console.warn('[PDV]', e.message); }
}

// ── ctx_enc=b64 분기 (GWP 새 탭 진입 시 원 질문 자동 전달) ─────
// ── 페이지 로드 시 GPS 위치를 미리 확인 (첫 메시지 지연 방지) ──
_detectGpsLocation();

// ── facts_enc=b64 (2026-07-05 신설) — 메인 AI 비서(hondi.net)가 GWP로
// 이 탭을 열 때 이미 확보한 부가 정보(현재는 currentLocation만, 자세한
// 설계 근거는 gopang/src/gopang/services/location.js의 _buildRoutingFacts
// 주석 참조). jeju.hondi.net은 별도 오리진이라 hondi.net의 localStorage를
// 못 읽으므로(_pdvLocationHint()가 항상 null이었던 것과 동일한 원인),
// GPS가 실패했을 때 이 값이 유일하게 남는 위치 단서가 된다.
let _urlFactsLocation = null;
(function initFacts() {
  try {
    const params = new URLSearchParams(location.search);
    const factsRaw = params.get('facts') || '';
    const factsEnc = params.get('facts_enc');
    if (!factsRaw) return;
    const json = factsEnc === 'b64'
      ? decodeURIComponent(escape(atob(factsRaw)))
      : decodeURIComponent(factsRaw);
    const facts = JSON.parse(json);
    if (facts && typeof facts.currentLocation === 'string') {
      _urlFactsLocation = facts.currentLocation;
      console.log('[Jeju] GWP facts로 위치 힌트 수신:', _urlFactsLocation);
    }
  } catch (e) { console.warn('[Jeju] facts 파싱 실패(무시):', e.message); }
})();

(function initCtx() {
  const params = new URLSearchParams(location.search);
  const ctxRaw = params.get('ctx') || '';
  const ctxEnc = params.get('ctx_enc');
  const ctx = ctxRaw
    ? (ctxEnc === 'b64'
        ? decodeURIComponent(escape(atob(ctxRaw)))
        : decodeURIComponent(ctxRaw))
    : null;
  // ★ 2026-07-21 신설 — 이 ctx는 AI 비서(AC)가 전달한 맥락인데,
  // 지금까지는 사용자가 이 탭에서 방금 직접 입력한 것처럼 아무 표시
  // 없이 그대로 전송했다 — 사용자가 "내가 AI 비서한테 한 말이 여기
  // 또 나온다"고 혼란스러워한 실사 지적으로 발견. klaw.hondi.net의
  // "(AI 비서로부터 전달됨)" 표시와 동일하게 맞춘다.
  if (ctx) setTimeout(() => qs('(AI 비서로부터 전달됨)\n' + ctx), 300);
})();
</script>

<script>
/* ── 고팡 SSO 인증 콜백 ── */
window._onGopangAuth = function(user) {
  if (!user) return;
  const badge = document.getElementById('auth-badge');
  if (badge) { badge.textContent = 'Lv.' + (user.level || 0); badge.style.display = 'inline-block'; }
  try { sessionStorage.setItem('gopang_sso_token', JSON.stringify(user)); } catch(e) {}
  console.log('[Jeju] ✅ 인증 완료 —', user.level, user.ipv6?.slice(-8));
};

// 2026-07-04: consent.html에서 돌아온 직후인지 확인 — §13b PDV_HISTORY_REQUEST.
document.addEventListener('DOMContentLoaded', async () => {
  if (!window.PdvHistoryClient) return;
  const back = window.PdvHistoryClient.checkPdvConsentReturn();
  if (!back) return;
  hideIntro();
  if (back.denied) {
    addMob('이전 기록 조회에 동의하지 않으셨네요. 처음부터 다시 도와드릴게요.', 'ai');
    return;
  }
  if (back.granted && back.resumeContext?.messages) {
    addMob('동의 확인했습니다. 이전 기록을 반영해서 이어가겠습니다...', 'ai');
    const tid = addMob('…', 'ai');
    const onProgress = (p) => {
      const el = document.getElementById(tid);
      if (el && p?.message) el.innerHTML = String(p.message).replace(/\n/g, '<br>');
    };
    try {
      const { text, trace } = await callAI(back.resumeContext.messages, back.resumeContext.latestUserText, onProgress);
      document.getElementById(tid)?.remove();
      addMob(text, 'ai');
      if (trace?.length) addTrace(trace.join(' → '));
      hist = back.resumeContext.messages.concat([{ role:'assistant', content:text }]);
    } catch (e) {
      document.getElementById(tid)?.remove();
      addMob(`이어서 진행하는 중 오류가 발생했습니다: ${e.message}`, 'ai');
    }
  }
});
</script>

<script>
// ── GWP_DONE 보고 — 공유모듈(gwp-report-client.js) 동적 import ──────
// 다른 15개 K-서비스와 통합할 로컬 복사본을 새로 만드는 대신, 이미
// 검증된 단일 소스를 그대로 가져다 쓴다(auth/subsystem-auth.js와 동일
// 크로스오리진 패턴). window.opener가 있을 때만(=GWP 경유 접속) 의미가
// 있고, 대화가 자유형이라 "완료" 시점이 없으므로 pagehide(탭을 실제로
// 떠나는 순간) 1회에만 발신한다 — 매 턴 발신 시 engine.js가 즉시 탭을
// 닫아버려 대화가 끊기므로 절대 금지.
window.addEventListener('pagehide', () => {
  if (!window.opener || !hist.length) return;
  import('https://hondi.net/src/gopang/gwp/gwp-report-client.js')
    .then(({ reportGwpSessionEnd }) => reportGwpSessionEnd({
      agencyId: _lastAgency || 'gov_do',
      guid: _getUserGuid(),
      messages: hist,
      resultText: hist[hist.length - 1]?.content || '',
      summaryLine: `${_lastAgency || 'jeju'} 상담 종료`,
      gwpMode: true,
      gwpOrigin: 'https://hondi.net',
      sessionId: _gwpSessionId,
      sessionStartedAt: _gwpSessionStartedAt,
      // G18(STAFF_REVIEW_GATE) 산출물 번들 연결(2026-07-19) — base64
      // 원본은 넘기지 않는다(이미 요청 탭 자신의 대화에 실려 kgov
      // GOV_TASK_SUBMIT_REQUEST로 처리 완료됨 — G19 정정 참고). 여기서는
      // "이 세션 중 무엇을 확보했는지" 메타데이터만 남긴다.
      attachedDocs: _acquiredDocs.map(d => ({
        docType: d.docType,
        fileName: d.file?.name || null,
        mime: d.file?.mime || null,
        size: d.file?.size || null,
        acquiredAt: d.acquiredAt,
      })),
    }))
    .catch(() => {}); // pagehide 중 실패는 조용히 무시 — 이미 최선을 다한 상태
});
</script>
