<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<title>제주도청 AI</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;height:100dvh;overflow:hidden;
  font-family:'Pretendard',-apple-system,'Helvetica Neue',sans-serif;
  font-size:15px;background:#fff;color:#111;-webkit-font-smoothing:antialiased}
:root{
  --sky:#0a7a4a;--sky-lt:#e6f4ec;--sky-dk:#075c37;
  --border:#e5e7eb;--txt2:#6b7280;--txt3:#9ca3af;
  --chip-bg:#f3f4f6;--chip-border:#e5e7eb;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;max-width:480px;margin:0 auto;background:#fff}
.topbar{display:flex;align-items:center;justify-content:space-between;
  padding:calc(var(--safe-t) + 12px) 16px 12px;
  border-bottom:1px solid var(--border);flex-shrink:0;background:#fff}
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-icon{width:28px;height:28px;background:var(--sky);border-radius:7px;
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
.topbar-name{font-size:15px;font-weight:800;color:#111;letter-spacing:-.3px}
.topbar-right{display:flex;align-items:center;gap:6px}
.auth-badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  background:var(--chip-bg);color:var(--txt2);border:1px solid var(--chip-border);display:none}
.trace-badge{font-size:10px;color:var(--txt3);padding:2px 8px;display:none}

.chat-screen{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:0 16px 12px;display:flex;flex-direction:column;gap:10px;background:#fff}

.intro-section{display:flex;flex-direction:column;align-items:center;padding:36px 0 28px;gap:14px}
.intro-icon{width:64px;height:64px;border-radius:18px;background:var(--sky);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(10,122,74,.25);color:#fff;font-size:28px;font-weight:800}
.intro-title{font-size:20px;font-weight:800;color:#111;letter-spacing:-.4px;text-align:center}
.intro-sub{font-size:14px;color:var(--txt2);line-height:1.6;text-align:center}

.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 4px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;
  background:#fff;border:1.5px solid var(--chip-border);
  font-size:13px;font-weight:600;color:#374151;cursor:pointer;
  transition:border-color .12s,background .12s,color .12s;white-space:nowrap}
.chip:hover,.chip:active{background:var(--sky-lt);border-color:var(--sky);color:var(--sky-dk)}

.b-ai{max-width:88%;align-self:flex-start;background:#f9fafb;border:1px solid var(--border);
  border-radius:4px 16px 16px 16px;padding:10px 14px;font-size:14px;line-height:1.7;color:#111;
  box-shadow:0 1px 2px rgba(0,0,0,.04)}
.b-user{max-width:88%;align-self:flex-end;background:var(--sky);color:#fff;
  border-radius:16px 16px 4px 16px;padding:10px 14px;font-size:14px;line-height:1.7}
.b-trace{font-size:10px;color:var(--txt3);align-self:flex-start;padding:0 4px;font-family:monospace}

.chat-input-area{background:#fff;border-top:1px solid var(--border);
  padding:10px 12px calc(10px + var(--safe-b));
  display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-textarea{flex:1;background:#f3f4f6;border:1.5px solid transparent;border-radius:22px;
  padding:10px 16px;font-family:'Pretendard',sans-serif;font-size:14px;
  resize:none;outline:none;max-height:100px;line-height:1.5;
  transition:border-color .15s,background .15s;color:#111}
.chat-textarea::placeholder{color:var(--txt3)}
.chat-textarea:focus{border-color:var(--sky);background:#fff}
.chat-send-btn{width:40px;height:40px;border-radius:50%;background:var(--sky);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;
  transition:background .12s;color:#fff}
.chat-send-btn:disabled{background:#bae6d0;cursor:not-allowed}

.toast{position:fixed;bottom:calc(80px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);
  background:#111;color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;
  z-index:9999;opacity:0;transition:all .25s;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">

  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">濟</div>
      <span class="topbar-name">제주도청 AI</span>
    </div>
    <div class="topbar-right">
      <span class="trace-badge" id="trace-badge"></span>
      <span class="auth-badge" id="auth-badge">L0</span>
    </div>
  </div>

  <div class="chat-screen" id="chat-screen">
    <div class="chat-body" id="mob-chat-body">

      <div class="intro-section" id="intro-section">
        <div class="intro-icon">濟</div>
        <div>
          <div class="intro-title">제주도청 · 시청 · 읍면동 AI</div>
          <div class="intro-sub" style="margin-top:6px">복지 · 세정 · 건축 · 상하수도 · 농업 등<br>제주 행정 관련 무엇이든 물어보세요.</div>
        </div>
        <div class="chip-row">
          <button class="chip" onclick="qs('수돗물에서 냄새가 나요')">상하수도 민원</button>
          <button class="chip" onclick="qs('기초생활수급 신청하려면 어디로 가야 하나요')">복지 안내</button>
          <button class="chip" onclick="qs('고향사랑기부금 얼마까지 세액공제 되나요')">고향사랑기부</button>
          <button class="chip" onclick="qs('건축허가 신청은 어디서 하나요')">건축 인허가</button>
        </div>
      </div>

    </div>

    <div class="chat-input-area">
      <textarea class="chat-textarea" id="mob-input" rows="1" placeholder="무엇을 도와드릴까요?"
        oninput="autoResize(this);updateSendBtn()"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();mobSend();}"></textarea>
      <button class="chat-send-btn" id="mob-send-btn" disabled onclick="mobSend()">↑</button>
    </div>
  </div>

</div>
<div class="toast" id="mob-toast"></div>

<script type="module">
import { assembleJejuSystemPrompt } from '/jeju-router.js';
window._assembleJejuSystemPrompt = assembleJejuSystemPrompt;
</script>

<script>
// ── 상수 ──────────────────────────────────────────────────────
const PROXY = 'https://hondi-proxy.tensor-city.workers.dev';
const SP_FALLBACK = `당신은 제주특별자치도청 AI입니다. 아직 라우터 로드에 실패해 도메인 특화 SP 없이
일반 지식으로만 응답 중임을 사용자에게 알리고, 정확한 안내는 제주콜센터(064-120)를 권장하세요.`;

// ── GPS 기반 읍면동 감지 (JEJU-GOV-COMMON §2 "관할 검증" 자동화) ──
// PDV 힌트(localStorage.gopang_user_v4)는 jeju.hondi.net이 별도 오리진이라
// hondi.net의 localStorage를 못 읽어 항상 null이었다(사고실험에서 발견된
// 문제). GPS 리버스 지오코딩(카카오 coord2address, hondi-proxy /geocode
// 경유)으로 대체 — 오리진 문제 없이 실제 현재 위치를 바로 얻는다.
let _gpsEmdCache = null;
let _gpsAttempted = false;

async function _detectGpsLocation() {
  if (_gpsAttempted) return _gpsEmdCache;
  _gpsAttempted = true;
  if (!navigator.geolocation) return null;
  try {
    const pos = await new Promise((resolve, reject) => {
      navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 6000, maximumAge: 300000 });
    });
    const { latitude: lat, longitude: lng } = pos.coords;
    const r = await fetch(`${PROXY}/geocode?lat=${lat}&lng=${lng}`);
    if (!r.ok) throw new Error('geocode ' + r.status);
    const d = await r.json();
    const doc = d.documents?.[0];
    if (!doc) return null;
    const region2 = doc.road_address?.region_2depth_name || doc.address?.region_2depth_name;
    const region3 = doc.road_address?.region_3depth_name
      || (doc.address?.region_3depth_name || '').split(' ')[0];
    // 제주 밖이면(다른 지역에서 접속) 위치 힌트를 쓰지 않는다 — 관할 오매칭 방지.
    if (!region2 || !['제주시', '서귀포시'].includes(region2) || !region3) {
      console.log('[Jeju] GPS 위치가 제주 관할 밖 — 힌트 미사용:', region2 || '(확인 안 됨)');
      return null;
    }
    _gpsEmdCache = { emdName: region3, city: region2 };
    console.log('[Jeju] GPS 위치 감지:', region3);
    toast(`현재 위치: ${region3}`);
    return _gpsEmdCache;
  } catch (e) {
    console.warn('[Jeju] GPS 위치 확인 실패(권한 거부·타임아웃 등):', e.message);
    return null;
  }
}

// ── PDV 거주지 힌트(GPS 실패 시 최후 폴백 — 대부분 null로 확인됨) ──
function _pdvLocationHint() {
  try {
    const p = JSON.parse(localStorage.getItem('gopang_user_v4') || sessionStorage.getItem('gopang_user_v4') || 'null');
    return p?.address || p?.location || null;
  } catch { return null; }
}

// ── PDV 중개 접근 (JEJU-GOV-COMMON §13) ─────────────────────────
// PDV는 나만의 AI 비서(hondi.net, GWP 오프너)만 읽는다. 이 함수는 그쪽에
// GWP_PDV_REQUEST를 보내고 사용자 승인을 기다린다. GWP를 거치지 않고 이
// 페이지에 직접 접속한 경우(window.opener 없음)는 즉시 no_opener로 반환한다
// (§13-5) — 이 경우 SP가 대화로 직접 물어보는 방식으로 전환해야 한다.
function _requestPdvData(fields, reason, requestingSp) {
  return new Promise((resolve) => {
    if (!window.opener) {
      resolve({ approved: false, no_opener: true });
      return;
    }
    const request_id = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      resolve({ approved: false, timeout: true });
    }, 60000); // 사용자가 승인 버튼 누를 시간 60초

    function handler(e) {
      const msg = e.data;
      if (msg?.type !== 'GWP_PDV_RESPONSE' || msg.request_id !== request_id) return;
      clearTimeout(timer);
      window.removeEventListener('message', handler);
      resolve(msg);
    }
    window.addEventListener('message', handler);

    window.opener.postMessage({
      type: 'GWP_PDV_REQUEST', request_id,
      requesting_sp: requestingSp, fields, reason,
    }, 'https://hondi.net');
  });
}

// SP 응답에서 [PDV_REQUEST: ...] 태그를 찾는다. request_id는 SP가 뭘 쓰든
// 신뢰하지 않고 이 함수 호출부에서 새로 발급한다(LLM이 진짜 UUID를 안정적으로
//못 만들 수 있어서).
function _parsePdvRequestTag(text) {
  const m = text.match(/\[PDV_REQUEST:([^\]]*fields=\[[^\]]*\][^\]]*)\]/);
  if (!m) return null;
  const body = m[0];
  const spMatch     = body.match(/requesting_sp=([^,\]]+)/);
  const fieldsMatch = body.match(/fields=\[([^\]]+)\]/);
  const reasonMatch = body.match(/reason=([^\]]+?)\]?$/);
  if (!fieldsMatch) return null;
  return {
    requestingSp: spMatch ? spMatch[1].trim() : 'unknown',
    fields: fieldsMatch[1].split(',').map(s => s.trim()).filter(Boolean),
    reason: reasonMatch ? reasonMatch[1].trim() : '',
    fullMatch: m[0],
  };
}

// ── 원시 채팅 완성 호출 (DeepSeek → Claude 폴백) ─────────────────
async function _rawChatCompletion(sp, messages) {
  try {
    const r = await fetch(`${PROXY}/ai/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider:'deepseek', model:'deepseek-chat', system:sp, messages, max_tokens:2000 }),
    });
    if (!r.ok) throw new Error(`proxy ${r.status}`);
    const d = await r.json();
    return d.content || '잠시 후 다시 시도해 주세요.';
  } catch(e) {
    console.warn('[Jeju] DeepSeek 폴백 → Claude:', e.message);
    const r2 = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:sp, messages:messages.slice(-8) }),
    });
    const d2 = await r2.json();
    return d2.content?.find(c => c.type === 'text')?.text || '오류가 발생했습니다.';
  }
}

// ── AI 호출(원본) — 라우터로 SP 동적 조립 + PDV 중개(§13) 2단계 흐름 ──
async function _callAIRaw(messages, latestUserText) {
  let sp = SP_FALLBACK, trace = [];
  try {
    const gps = await _detectGpsLocation();
    const locationHint = gps?.emdName || _pdvLocationHint();
    const r = await window._assembleJejuSystemPrompt(latestUserText, locationHint);
    sp = r.systemPrompt;
    trace = r.trace;
  } catch (e) {
    console.warn('[Jeju] SP 조립 실패, 폴백 사용:', e.message);
  }
  document.getElementById('trace-badge').textContent = trace.join(' > ');
  document.getElementById('trace-badge').style.display = trace.length ? 'inline-block' : 'none';

  let text = await _rawChatCompletion(sp, messages);

  // Step 5 연장: SP가 PDV 필드를 요청했으면 나만의 AI 비서에게 중개 요청
  const pdvReq = _parsePdvRequestTag(text);
  if (pdvReq) {
    const result = await _requestPdvData(pdvReq.fields, pdvReq.reason, pdvReq.requestingSp);
    let pdvContext;
    if (result.no_opener) {
      pdvContext = `[PDV_RESULT: 이 세션은 GWP(나만의 AI 비서)를 거치지 않고 직접 접속됐습니다. ` +
        `PDV 중개 요청 자체가 불가능합니다 — §13-5에 따라 사용자에게 필요한 정보를 대화로 직접 물어보고, ` +
        `그 답변은 세션 안에서만 참고하고 PDV에 저장하지 마십시오.]`;
    } else if (result.timeout) {
      pdvContext = `[PDV_RESULT: 사용자가 60초 내에 승인/거부를 응답하지 않았습니다. 응답 없이 진행 가능한 선까지만 답하십시오.]`;
    } else if (!result.approved) {
      pdvContext = `[PDV_RESULT: 사용자가 정보 제공을 거부했습니다(fields=${pdvReq.fields.join(',')}). ` +
        `§11 능동적 역량 원칙에 따라 이 필드 없이 답할 수 있는 부분까지는 계속 답하고, 왜 더 정확히 못 답하는지만 짧게 밝히십시오.]`;
    } else {
      pdvContext = `[PDV_RESULT: 승인됨. 값: ${JSON.stringify(result.values)}. ` +
        `not_in_pdv:true로 표시된 필드는 실제로 PDV에 없는 것이니 지어내지 말고 §13-4 문구로 안내하십시오.]`;
    }
    const followup = [...messages,
      { role: 'assistant', content: text },
      { role: 'user', content: pdvContext },
    ];
    text = await _rawChatCompletion(sp, followup);
  }

  return { text, trace };
}

// ── AI 호출(§13b PDV_HISTORY_REQUEST 가로채기 계층) ──────────────
// 2026-07-04: tax/school/stock/market과 동일 패턴. scope 값은 jeju-router.js
// (assembleJejuSystemPrompt)가 §13b 자리표시자에 이미 정확히 치환해뒀으므로
// (SP_CODE_TO_PDV_SCOPE 참조), 여기서는 그 값을 그대로 신뢰해 태그를
// 파싱·조회하기만 하면 된다.
async function callAI(messages, latestUserText) {
  const raw = await _callAIRaw(messages, latestUserText);
  if (!window.PdvHistoryClient || !/\[PDV(?:_HISTORY)?_REQUEST:/.test(raw.text)) return raw;

  let ipv6 = 'anonymous';
  try {
    const token = JSON.parse(sessionStorage.getItem('gopang_sso_token') || '{}');
    ipv6 = token.ipv6 || 'anonymous';
  } catch (e) {}

  const { interceptPdvTags } = window.PdvHistoryClient;
  const r = await interceptPdvTags(raw.text, {
    svc: 'jeju', ipv6,
    resumeContext: { messages, latestUserText },
  });
  if (!r) return raw;
  if (r.redirecting) return raw; // 페이지 이동 중 — 반환값은 사실상 안 쓰임

  const summaryText = (r.results || []).map(x => {
    if (x.error) return `(${x.scope} 이력 조회 실패: ${x.error})`;
    if (!x.summary || x.summary.available === false) return `(${x.scope} 이전 기록 없음)`;
    return `(${x.scope} 이전 기록: ${JSON.stringify(x.summary)})`;
  }).join('\n');

  const cleaned = raw.text.replace(/\[PDV(?:_HISTORY)?_REQUEST:[^\]]+\]/g, '').trim();
  const followUp = [
    ...messages,
    { role: 'assistant', content: cleaned || '(이전 기록을 조회하겠습니다)' },
    { role: 'user', content: `[시스템: PDV 조회 결과]\n${summaryText}\n\n위 조회 결과를 반영해서 답변을 이어가 주세요.` },
  ];
  return _callAIRaw(followUp, latestUserText);
}

// ── UI 헬퍼 ───────────────────────────────────────────────────
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 100) + 'px'; }
function updateSendBtn() {
  const btn = document.getElementById('mob-send-btn');
  if (btn) btn.disabled = !document.getElementById('mob-input').value.trim();
}

let hist = [];
let mc = 0;

function hideIntro() {
  const intro = document.getElementById('intro-section');
  if (intro) intro.style.display = 'none';
}

async function mobSend() {
  const inp = document.getElementById('mob-input');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  autoResize(inp);
  updateSendBtn();
  hideIntro();
  addMob(msg, 'user');
  hist.push({ role:'user', content:msg });
  const btn = document.getElementById('mob-send-btn');
  btn.disabled = true;
  const tid = addMob('…', 'ai');
  try {
    const { text, trace } = await callAI(hist.slice(-10), msg);
    document.getElementById(tid)?.remove();
    addMob(text, 'ai');
    if (trace?.length) addTrace(trace.join(' → '));
    hist.push({ role:'assistant', content:text });
    _recordPdv(msg, trace);
  } catch (e) {
    document.getElementById(tid)?.remove();
    addMob('오류가 발생했습니다. 다시 시도해 주세요.', 'ai');
  }
  btn.disabled = false;
}

function addMob(text, type) {
  const id = 'mb' + (mc++);
  const body = document.getElementById('mob-chat-body');
  const d = document.createElement('div');
  d.id = id;
  d.className = type === 'user' ? 'b-user' : 'b-ai';
  d.innerHTML = text.replace(/\n/g, '<br>');
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
  return id;
}
function addTrace(text) {
  const body = document.getElementById('mob-chat-body');
  const d = document.createElement('div');
  d.className = 'b-trace';
  d.textContent = '[SP_CHAIN] ' + text;
  body.appendChild(d);
  body.scrollTop = body.scrollHeight;
}

function qs(s) {
  document.getElementById('mob-input').value = s;
  updateSendBtn();
  mobSend();
}
function toast(msg) {
  const t = document.getElementById('mob-toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── PDV 표준 payload ───────────────────────────────────────────
function _recordPdv(userMsg, trace) {
  try {
    const token = JSON.parse(sessionStorage.getItem('gopang_sso_token') || '{}');
    const user_guid = token.ipv6 || 'anonymous';
    fetch(`${PROXY}/pdv_log`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_guid,
        source: 'jeju',
        report: {
          pdv_6w: {
            who:   user_guid,
            when:  new Date().toISOString(),
            where: window._gopangLocation || '위치 미확인',
            what:  '제주도청 AI 채팅',
            how:   `민원: ${userMsg.slice(0, 60)} / 체인: ${(trace||[]).join('>')}`,
            why:   '제주 지방행정 안내',
          },
        },
      }),
    }).catch(() => {});
  } catch(e) { console.warn('[PDV]', e.message); }
}

// ── ctx_enc=b64 분기 (GWP 새 탭 진입 시 원 질문 자동 전달) ─────
// ── 페이지 로드 시 GPS 위치를 미리 확인 (첫 메시지 지연 방지) ──
_detectGpsLocation();

(function initCtx() {
  const params = new URLSearchParams(location.search);
  const ctxRaw = params.get('ctx') || '';
  const ctxEnc = params.get('ctx_enc');
  const ctx = ctxRaw
    ? (ctxEnc === 'b64'
        ? decodeURIComponent(escape(atob(ctxRaw)))
        : decodeURIComponent(ctxRaw))
    : null;
  if (ctx) setTimeout(() => qs(ctx), 300);
})();
</script>

<script>
/* ── 고팡 SSO 인증 콜백 ── */
window._onGopangAuth = function(user) {
  if (!user) return;
  const badge = document.getElementById('auth-badge');
  if (badge) { badge.textContent = 'Lv.' + (user.level || 0); badge.style.display = 'inline-block'; }
  try { sessionStorage.setItem('gopang_sso_token', JSON.stringify(user)); } catch(e) {}
  console.log('[Jeju] ✅ 인증 완료 —', user.level, user.ipv6?.slice(-8));
};

// 2026-07-04: consent.html에서 돌아온 직후인지 확인 — §13b PDV_HISTORY_REQUEST.
document.addEventListener('DOMContentLoaded', async () => {
  if (!window.PdvHistoryClient) return;
  const back = window.PdvHistoryClient.checkPdvConsentReturn();
  if (!back) return;
  hideIntro();
  if (back.denied) {
    addMob('이전 기록 조회에 동의하지 않으셨네요. 처음부터 다시 도와드릴게요.', 'ai');
    return;
  }
  if (back.granted && back.resumeContext?.messages) {
    addMob('동의 확인했습니다. 이전 기록을 반영해서 이어가겠습니다...', 'ai');
    const tid = addMob('…', 'ai');
    try {
      const { text, trace } = await callAI(back.resumeContext.messages, back.resumeContext.latestUserText);
      document.getElementById(tid)?.remove();
      addMob(text, 'ai');
      if (trace?.length) addTrace(trace.join(' → '));
      hist = back.resumeContext.messages.concat([{ role:'assistant', content:text }]);
    } catch (e) {
      document.getElementById(tid)?.remove();
      addMob(`이어서 진행하는 중 오류가 발생했습니다: ${e.message}`, 'ai');
    }
  }
});
</script>
